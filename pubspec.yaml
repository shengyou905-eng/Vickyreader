name: ai_reader
description: "AI辅助阅读器 - 支持EPUB阅读、AI解释、笔记标注"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

hooks:
  user_defines:
    sqlite3:
      source: process

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # EPUB parsing
  archive: ^3.6.1
  xml: ^6.5.0
  html: ^0.15.5
  crypto: ^3.0.6

  # WebView for EPUB rendering
  webview_flutter: ^4.10.0

  # PDF rendering
  pdfx: ^2.6.0

  # Local storage
  sqflite: ^2.4.1
  sqflite_common_ffi: ^2.3.4+4
  sqlite3_flutter_libs: ^0.5.30
  path_provider: ^2.1.5
  path: ^1.9.1

  # File picker
  file_picker: ^8.1.6

  # HTTP client
  http: ^1.2.2

  # State management
  provider: ^6.1.2

  # Settings
  shared_preferences: ^2.3.4

  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  share_plus: ^10.1.4
  msix: ^3.16.13
  charset: ^2.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/

msix_config:
  display_name: 知读
  publisher_display_name: 知读工作室
  identity_name: com.reader.ai_reader
  msix_version: 1.0.0.0
  logo_path: assets\icon.png
  capabilities: "internetClient,privateNetworkClientServer"
  store: false
  certificate_path: assets\certificate.pfx
  certificate_password: "$env(CERT_PASSWORD)"
  install_certificate: true
